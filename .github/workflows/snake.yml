name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Serpentum
          outputs: |
            output/snake.svg
            output/snake-neon.svg?color=neon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and commit
        run: |
          ls -la output/ || echo "No output files"
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add output/
          git diff --staged --quiet || git commit -m "chore: update snake"
          git push || echo "Push failed"
