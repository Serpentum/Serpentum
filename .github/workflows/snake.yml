name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Serpentum
          outputs: |
            output/snake.svg?palette=github-light&color_snake=#00f5d4&color_dots=#0d1117,#00f5d4,#00f5d4,#00f5d4,#00f5d4
            output/snake-dark.svg?palette=github-dark&color_snake=#00f5d4&color_dots=#161b22,#00f5d4,#00f5d4,#00f5d4,#00f5d4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
